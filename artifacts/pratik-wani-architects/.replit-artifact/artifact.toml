kind = "web"
previewPath = "/"
title = "Pratik Wani Architects"
version = "1.0.0"
id = "artifacts/pratik-wani-architects"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21585

[services.development]
run = "node /home/runner/workspace/artifacts/pratik-wani-architects/server.js"

[services.production]
build = [ "bash", "-c", "mkdir -p /home/runner/workspace/artifacts/pratik-wani-architects/dist/public && cp -r /home/runner/workspace/artifacts/pratik-wani-architects/public/. /home/runner/workspace/artifacts/pratik-wani-architects/dist/public/" ]
publicDir = "artifacts/pratik-wani-architects/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21585"
